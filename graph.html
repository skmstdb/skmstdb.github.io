<!DOCTYPE html>
<html lang="ja">

<head>
    <!-- Analytics and Tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6C7BJGKMFT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-6C7BJGKMFT');
    </script>

    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="堺雅人データベース【非公式】 / Sakai Masato Database [Unofficial]">
    <meta name="keywords"
        content="堺雅人, Sakai Masato, Masato Sakai, Database, heatmap, contribution graph, calendar, カレンダー">

    <!-- Title -->
    <title>Sakai Masato Database</title>

    <!-- Favicon for all devices and platforms -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" sizes="32x32" href="/favicon.png">
    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">

    <!-- External Stylesheets and Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/04-activity.css">
    <link rel="stylesheet" href="/navi/navi.css">

    <!-- Scripts and Other Resources -->
    <script src="js/mobileview.js"></script>
    <script src="js/visibility.js"></script>
    <script src="/js/darkmode.js"></script>
    <script src="/navi/navHighlight.js"></script>
    <script src="/js/timezone.js"></script>
    <script src="/js/japan-prefecture-map.js"></script>
    <script src="/js/04-activity.js"></script>
</head>

<body>
    <aside class="sidebar">
    </aside>

    <div class="main-content-wrapper">
        <div class="main-content">
            <div class="filter-container">
                <div id="filter-row-1">
                    <div class="filter-item">
                        <label class="switch-label">映画</label>
                        <div class="legend-color activity-movie"></div>
                        <label class="switch">
                            <input type="checkbox" class="type-filter" data-type="映画">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="filter-item">
                        <label class="switch-label">TV</label>
                        <div class="legend-color activity-tv"></div>
                        <label class="switch">
                            <input type="checkbox" class="type-filter" data-type="TV">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="filter-item">
                        <label class="switch-label">舞台</label>
                        <div class="legend-color activity-stage"></div>
                        <label class="switch">
                            <input type="checkbox" class="type-filter" data-type="舞台">
                            <span class="slider round"></span>
                        </label>
                    </div>

                    <div class="filter-item">
                        <label class="switch-label">その他</label>
                        <div class="legend-color activity-other"></div>
                        <label class="switch">
                            <input type="checkbox" class="type-filter" data-type="その他">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="filter-item">
                        <label class="switch-label">声の出演</label>
                        <div class="legend-color activity-voice"></div>
                        <label class="switch">
                            <input type="checkbox" class="type-filter" data-type="声の出演">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="filter-item">
                        <label class="switch-label">BOOK</label>
                        <div class="legend-color activity-book"></div>
                        <label class="switch">
                            <input type="checkbox" class="type-filter" data-type="BOOK">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
                <div id="filter-row-2">
                    <div class="filter-item">
                        <label class="switch-label">主演</label>
                        <label class="switch">
                            <input type="checkbox" id="lead-role-filter">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="filter-item">
                        <label class="switch-label">非主演</label>
                        <label class="switch">
                            <input type="checkbox" id="non-lead-role-filter">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="filter-item">
                        <label class="switch-label">個人受賞</label>
                        <label class="switch">
                            <input type="checkbox" id="individual-award-filter">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
                <div id="filter-row-3">
                    <div class="filter-item">
                        <label class="switch-label">Year View</label>
                        <label class="switch">
                            <input type="checkbox" id="year-view-filter" class="view-filter" data-view="year">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="filter-item">
                        <label class="switch-label">Age View</label>
                        <label class="switch">
                            <input type="checkbox" id="age-view-filter" class="view-filter" data-view="age">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="filter-item">
                        <label class="switch-label">Chart View</label>
                        <label class="switch">
                            <input type="checkbox" id="chart-view-filter" class="view-filter" data-view="chart">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="filter-item">
                        <label class="switch-label">Map View</label>
                        <label class="switch">
                            <input type="checkbox" id="map-view-filter" class="view-filter" data-view="map">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </div>


            <div class="contribution-graph" id="contribution-graph" style="display: none;">
            </div>

            <div class="contribution-graph" id="year-graph-container" style="display: none;">
            </div>

            <div class="contribution-graph" id="age-graph-container" style="display: none;">
            </div>

            <div class="contribution-graph" id="chart-view-container" style="display: none;">
            </div>

            <div class="contribution-graph map-view-shell" id="map-view-container" style="display: none;">
                <div id="activity-map-container">
                    <div id="activity-map-loading">Loading...</div>
                    <div id="activity-map-stage">
                        <div id="activity-map-wrapper">
                            <svg id="activity-world-map" aria-label="Location map"></svg>
                        </div>
                        <div class="activity-map-zoom-controls">
                            <button class="activity-map-zoom-btn" id="activity-map-zoom-in" title="Zoom in">+</button>
                            <button class="activity-map-zoom-btn" id="activity-map-zoom-out" title="Zoom out">−</button>
                            <button class="activity-map-zoom-btn" id="activity-map-zoom-reset" title="Reset">⟲</button>
                        </div>
                    </div>
                    <div id="activity-map-events-container">
                        <div id="activity-map-flags-section"></div>
                        <div id="activity-map-events-grid"></div>
                    </div>
                </div>
            </div>

            <div class="contribution-graph map-view-shell" id="japan-map-view-container" style="display: none;">
                <div id="japan-map-container"></div>
            </div>

            <div id="works-detail-container" class="works-detail-container" style="display: none;">
                <div class="detail-header">
                    <h3>出演</h3><button class="close-detail">×</button>
                </div>
                <div class="detail-content"></div>
            </div>
        </div>
    </div>
</body>

</html>
